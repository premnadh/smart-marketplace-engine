version: "3.9"

services:

  db:
    image: postgres:15
    container_name: marketplace_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: marketplace_backend
    depends_on:
      - db
    ports:
      - "8000:8000"